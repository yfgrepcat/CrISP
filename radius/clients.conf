# Minimal RADIUS clients (NAS) for the AS12 enterprise lab.
# Any device that wants to authenticate users against this server must be
# listed here with a matching shared secret.

client localhost {
    ipaddr = 127.0.0.1
    secret = testing123
}

# Anything inside the AS12 IGP (120.0.32.0/20) may use the RADIUS service.
client as12 {
    ipaddr = 120.0.32.0/20
    secret = testing123
}

# CRISP employee subnet on the private client net.
client crisp-employees {
    ipaddr = 10.12.30.0/24
    secret = testing123
}

# Management network (clab-mgmt) for quick host-side radtest.
client mgmt {
    ipaddr = 172.20.20.0/24
    secret = testing123
}
