# Minimal RADIUS clients (NAS) for the AS12 enterprise lab.
# Any device that wants to authenticate users against this server must be
# listed here with a matching shared secret.

client localhost {
    ipaddr = 127.0.0.1
    secret = testing123
}

# CRISP employee subnet on the private client net.
client crisp-employees {
    ipaddr = 10.12.30.0/24
    secret = testing123
}

# Nomad VPN CPE source IP.
client vpn-users {
    ipaddr = 192.168.1.10/32
    secret = testing123
}
