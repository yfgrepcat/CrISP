# =============================================================================
# Enterprise OSPF + CRISP lab
# Intra-AS addressing carved from 120.0.32.0/20  (= 120.0.32.0 - 120.0.47.255)
#
# Loopbacks     -> 120.0.32.0/24
#   P1..P4         120.0.32.{1..4}/32
#   PE-isp         120.0.32.21/32
#   PE-nomad       120.0.32.22/32
#   PE-site        120.0.32.23/32
#
# Core P2P /31s -> 120.0.33.0/24
#   P1-P2          120.0.33.0/31    (P1 .0,  P2 .1)
#   P1-P3          120.0.33.2/31    (P1 .2,  P3 .3)
#   P1-P4          120.0.33.4/31    (P1 .4,  P4 .5)
#   P2-P3          120.0.33.6/31    (P2 .6,  P3 .7)
#   P2-P4          120.0.33.8/31    (P2 .8,  P4 .9)
#   P3-P4          120.0.33.10/31   (P3 .10, P4 .11)
#
# PE uplinks /31s -> 120.0.34.0/24
#   P1-PE-isp      120.0.34.0/31    (P1 .0, PE-isp .1)
#   P2-PE-nomad    120.0.34.2/31    (P2 .2, PE-nomad .3)
#   P3-PE-site     120.0.34.4/31    (P3 .4, PE-site .5)
#   P2-RADIUS      120.0.34.10/31   (P2 .10, RADIUS .11)
#
# VoIP /31s -> 120.0.35.0/24
#   P4-pbx         120.0.35.0/31    (P4 .0, pbx .1)         -- PBX branché sur P4
#   The softphones now live on the CRISP client net at 10.12.30.101/24 and 10.12.30.102/24.
#
# Service /31s -> 120.0.36.0/24
#   P1-DNS         120.0.36.0/31    (P1 .0, DNS .1)
#   P1-DHCP        120.0.36.2/31    (P1 .2, DHCP .3)
#
# CRISP router and downstream nets
#   PE-site-CRISP   120.0.39.0/31    (PE-site .0, CRISP .1)
#   CRISP DMZ VLAN  120.0.40.0/24    (CRISP .1, ovpn + web)
#   CRISP SVC VLAN  120.0.41.0/24    (CRISP .1, PBX + DHCP)
#   CRISP clients   10.12.30.0/24    (CRISP .1, client PC + softphones)
#
# Public side (NOT in OSPF — opaque to the enterprise IGP)
#   net-isp 203.0.113.0/24  (RFC 5737 TEST-NET-3 as the "Internet")
#     PE-isp e1-2     203.0.113.1/24
#     ovpn-site eth2  203.0.113.50/24    (CRISP DMZ leg / OpenVPN listener)
#     home-ce eth1    203.0.113.20/24    (CE WAN, source of NATed nomad traffic)
#
# Nomad home network (behind the CE — opaque to everything else)
#   net-home 192.168.1.0/24
#     home-ce eth2    192.168.1.1/24     (CE LAN, NAT gateway)
#     ovpn-nomad eth1 192.168.1.10/24    (CPE plugged into the CE)
#
# VPN tunnel (point-to-point, static-key)
#   10.255.255.0/30   (nomad .1, HQ .2)
#
# Host bridges (create on host before deploy):
#   sudo ip link add name net-isp  type bridge && sudo ip link set net-isp  up
#   sudo ip link add name net-site type bridge && sudo ip link set net-site up
#   sudo ip link add name net-home type bridge && sudo ip link set net-home up
#
# External breakout trunk:
#   TRUNK_IFACE=<host-nic> sudo -E ./scripts/create-host-bridges.sh
#   - host NIC trunk subinterface VLAN 104 -> br-vlan104 -> P4:Ethernet4
#   - host NIC trunk subinterface VLAN 121 -> br-vlan121 -> PE-isp:e1-3
#   - host NIC trunk subinterface VLAN 122 -> br-vlan122 -> PE-site:e1-5
# =============================================================================

name: enterprise-ospf-bgp

