# =============================================================================
# Enterprise OSPF + eBGP lab
# Intra-AS addressing carved from 120.0.32.0/20  (= 120.0.32.0 - 120.0.47.255)
#
# Loopbacks     -> 120.0.32.0/24
#   P1..P4         120.0.32.{1..4}/32
#   PE-isp         120.0.32.21/32
#   PE-nomad       120.0.32.22/32
#   PE-site        120.0.32.23/32
#
# Core P2P /31s -> 120.0.33.0/24
#   P1-P2          120.0.33.0/31    (P1 .0,  P2 .1)
#   P1-P3          120.0.33.2/31    (P1 .2,  P3 .3)
#   P1-P4          120.0.33.4/31    (P1 .4,  P4 .5)
#   P2-P3          120.0.33.6/31    (P2 .6,  P3 .7)
#   P2-P4          120.0.33.8/31    (P2 .8,  P4 .9)
#   P3-P4          120.0.33.10/31   (P3 .10, P4 .11)
#
# PE uplinks /31s -> 120.0.34.0/24
#   P1-PE-isp      120.0.34.0/31    (P1 .0, PE-isp .1)
#   P2-PE-nomad    120.0.34.2/31    (P2 .2, PE-nomad .3)
#   P3-PE-site     120.0.34.4/31    (P3 .4, PE-site .5)
#   P2-DNS         120.0.34.6/31    (P2 .6, DNS .7)
#
# VoIP /31s -> 120.0.35.0/24
#   P4-pbx         120.0.35.0/31    (P4 .0, pbx .1)         -- PBX branché sur P4
#   PE-site-phone  120.0.35.2/31    (PE-site .2, phone-site .3)  -- client intranet
#   PE-nomad-phone 120.0.35.4/31    (PE-nomad .4, phone-nomad .5) -- client externe
#
# Service segment -> 120.0.36.0/24
#   P3-DHCP        120.0.36.0/24    (P3 e1-11 .1, DHCP .10, Clients .100-.200)
#
# Host bridges (create on host before deploy):
#   sudo ip link add name net-isp type bridge && sudo ip link set net-isp   up
#   sudo ip link add name net-nomad type bridge && sudo ip link set net-nomad up
#   sudo ip link add name net-site type bridge && sudo ip link set net-site  up
#   sudo ip link add name svc-net type bridge && sudo ip link set svc-net   up
# =============================================================================

name: enterprise-ospf-bgp

mgmt:
  network: clab-mgmt
  ipv4-subnet: 172.20.20.0/24

topology:
  kinds:
    nokia_srlinux:
      image: ghcr.io/nokia/srlinux:24.10.7
      type: ixr-d2
    linux:
      image: ubuntu:22.04

  nodes:
    P1:
      kind: nokia_srlinux
      mgmt-ipv4: 172.20.20.11
      group: core
      startup-config: |
        set / interface ethernet-1/1 admin-state enable
        set / interface ethernet-1/1 subinterface 0 admin-state enable
        set / interface ethernet-1/1 subinterface 0 ipv4 admin-state enable
        set / interface ethernet-1/1 subinterface 0 ipv4 address 120.0.33.0/31
        set / interface ethernet-1/2 admin-state enable
        set / interface ethernet-1/2 subinterface 0 admin-state enable
        set / interface ethernet-1/2 subinterface 0 ipv4 admin-state enable
        set / interface ethernet-1/2 subinterface 0 ipv4 address 120.0.33.2/31
        set / interface ethernet-1/3 admin-state enable
        set / interface ethernet-1/3 subinterface 0 admin-state enable
        set / interface ethernet-1/3 subinterface 0 ipv4 admin-state enable
        set / interface ethernet-1/3 subinterface 0 ipv4 address 120.0.33.4/31
        set / interface ethernet-1/10 admin-state enable
        set / interface ethernet-1/10 subinterface 0 admin-state enable
        set / interface ethernet-1/10 subinterface 0 ipv4 admin-state enable
        set / interface ethernet-1/10 subinterface 0 ipv4 address 120.0.34.0/31
        set / interface system0 admin-state enable
        set / interface system0 subinterface 0 admin-state enable
        set / interface system0 subinterface 0 ipv4 admin-state enable
        set / interface system0 subinterface 0 ipv4 address 120.0.32.1/32
        set / network-instance default interface ethernet-1/1.0
        set / network-instance default interface ethernet-1/2.0
        set / network-instance default interface ethernet-1/3.0
        set / network-instance default interface ethernet-1/10.0
        set / network-instance default interface system0.0
        set / network-instance default protocols ospf instance main admin-state enable
        set / network-instance default protocols ospf instance main version ospf-v2
        set / network-instance default protocols ospf instance main router-id 120.0.32.1
        set / network-instance default protocols ospf instance main area 0.0.0.0 interface system0.0 passive true
        set / network-instance default protocols ospf instance main area 0.0.0.0 interface ethernet-1/1.0 interface-type point-to-point
        set / network-instance default protocols ospf instance main area 0.0.0.0 interface ethernet-1/2.0 interface-type point-to-point
        set / network-instance default protocols ospf instance main area 0.0.0.0 interface ethernet-1/3.0 interface-type point-to-point
        set / network-instance default protocols ospf instance main area 0.0.0.0 interface ethernet-1/10.0 interface-type point-to-point

    P2:
      kind: nokia_srlinux
      mgmt-ipv4: 172.20.20.12
      group: core
      startup-config: |
        set / interface ethernet-1/1 admin-state enable
        set / interface ethernet-1/1 subinterface 0 admin-state enable
        set / interface ethernet-1/1 subinterface 0 ipv4 admin-state enable
        set / interface ethernet-1/1 subinterface 0 ipv4 address 120.0.33.1/31
        set / interface ethernet-1/2 admin-state enable
        set / interface ethernet-1/2 subinterface 0 admin-state enable
        set / interface ethernet-1/2 subinterface 0 ipv4 admin-state enable
        set / interface ethernet-1/2 subinterface 0 ipv4 address 120.0.33.6/31
        set / interface ethernet-1/3 admin-state enable
        set / interface ethernet-1/3 subinterface 0 admin-state enable
        set / interface ethernet-1/3 subinterface 0 ipv4 admin-state enable
        set / interface ethernet-1/3 subinterface 0 ipv4 address 120.0.33.8/31
        set / interface ethernet-1/4 admin-state enable
        set / interface ethernet-1/4 subinterface 0 admin-state enable
        set / interface ethernet-1/4 subinterface 0 ipv4 admin-state enable
        set / interface ethernet-1/4 subinterface 0 ipv4 address 120.0.34.6/31
        set / interface ethernet-1/10 admin-state enable
        set / interface ethernet-1/10 subinterface 0 admin-state enable
        set / interface ethernet-1/10 subinterface 0 ipv4 admin-state enable
        set / interface ethernet-1/10 subinterface 0 ipv4 address 120.0.34.2/31
        set / interface system0 admin-state enable
        set / interface system0 subinterface 0 admin-state enable
        set / interface system0 subinterface 0 ipv4 admin-state enable
        set / interface system0 subinterface 0 ipv4 address 120.0.32.2/32
        set / network-instance default interface ethernet-1/1.0
        set / network-instance default interface ethernet-1/2.0
        set / network-instance default interface ethernet-1/3.0
        set / network-instance default interface ethernet-1/4.0
        set / network-instance default interface ethernet-1/10.0
        set / network-instance default interface system0.0
        set / network-instance default protocols ospf instance main admin-state enable
        set / network-instance default protocols ospf instance main version ospf-v2
        set / network-instance default protocols ospf instance main router-id 120.0.32.2
        set / network-instance default protocols ospf instance main area 0.0.0.0 interface system0.0 passive true
        set / network-instance default protocols ospf instance main area 0.0.0.0 interface ethernet-1/1.0 interface-type point-to-point
        set / network-instance default protocols ospf instance main area 0.0.0.0 interface ethernet-1/2.0 interface-type point-to-point
        set / network-instance default protocols ospf instance main area 0.0.0.0 interface ethernet-1/3.0 interface-type point-to-point
        set / network-instance default protocols ospf instance main area 0.0.0.0 interface ethernet-1/4.0 interface-type point-to-point
        set / network-instance default protocols ospf instance main area 0.0.0.0 interface ethernet-1/10.0 interface-type point-to-point

    dns-as12:
      kind: linux
      image: internetsystemsconsortium/bind9:9.21
      mgmt-ipv4: 172.20.20.30
      group: services
      binds:
        - ./dns:/etc/bind
      exec:
        - ip link set eth1 up
        - ip addr add 120.0.34.7/31 dev eth1

    P3:
      kind: nokia_srlinux
      mgmt-ipv4: 172.20.20.13
      group: core
      startup-config: |
        set / interface ethernet-1/1 admin-state enable
        set / interface ethernet-1/1 subinterface 0 admin-state enable
        set / interface ethernet-1/1 subinterface 0 ipv4 admin-state enable
        set / interface ethernet-1/1 subinterface 0 ipv4 address 120.0.33.3/31
        set / interface ethernet-1/2 admin-state enable
        set / interface ethernet-1/2 subinterface 0 admin-state enable
        set / interface ethernet-1/2 subinterface 0 ipv4 admin-state enable
        set / interface ethernet-1/2 subinterface 0 ipv4 address 120.0.33.7/31
        set / interface ethernet-1/3 admin-state enable
        set / interface ethernet-1/3 subinterface 0 admin-state enable
        set / interface ethernet-1/3 subinterface 0 ipv4 admin-state enable
        set / interface ethernet-1/3 subinterface 0 ipv4 address 120.0.33.10/31
        set / interface ethernet-1/10 admin-state enable
        set / interface ethernet-1/10 subinterface 0 admin-state enable
        set / interface ethernet-1/10 subinterface 0 ipv4 admin-state enable
        set / interface ethernet-1/10 subinterface 0 ipv4 address 120.0.34.4/31
        set / interface ethernet-1/11 admin-state enable
        set / interface ethernet-1/11 subinterface 0 admin-state enable
        set / interface ethernet-1/11 subinterface 0 ipv4 admin-state enable
        set / interface ethernet-1/11 subinterface 0 ipv4 address 120.0.36.1/24
        set / interface system0 admin-state enable
        set / interface system0 subinterface 0 admin-state enable
        set / interface system0 subinterface 0 ipv4 admin-state enable
        set / interface system0 subinterface 0 ipv4 address 120.0.32.3/32
        set / network-instance default interface ethernet-1/1.0
        set / network-instance default interface ethernet-1/2.0
        set / network-instance default interface ethernet-1/3.0
        set / network-instance default interface ethernet-1/10.0
        set / network-instance default interface ethernet-1/11.0
        set / network-instance default interface system0.0
        set / network-instance default protocols ospf instance main admin-state enable
        set / network-instance default protocols ospf instance main version ospf-v2
        set / network-instance default protocols ospf instance main router-id 120.0.32.3
        set / network-instance default protocols ospf instance main area 0.0.0.0 interface system0.0 passive true
        set / network-instance default protocols ospf instance main area 0.0.0.0 interface ethernet-1/1.0 interface-type point-to-point
        set / network-instance default protocols ospf instance main area 0.0.0.0 interface ethernet-1/2.0 interface-type point-to-point
        set / network-instance default protocols ospf instance main area 0.0.0.0 interface ethernet-1/3.0 interface-type point-to-point
        set / network-instance default protocols ospf instance main area 0.0.0.0 interface ethernet-1/10.0 interface-type point-to-point
        set / network-instance default protocols ospf instance main area 0.0.0.0 interface ethernet-1/11.0 passive true
  
    P4:
      kind: nokia_srlinux
      mgmt-ipv4: 172.20.20.14
      group: core
      startup-config: |
        set / interface ethernet-1/1 admin-state enable
        set / interface ethernet-1/1 subinterface 0 admin-state enable
        set / interface ethernet-1/1 subinterface 0 ipv4 admin-state enable
        set / interface ethernet-1/1 subinterface 0 ipv4 address 120.0.33.5/31
        set / interface ethernet-1/2 admin-state enable
        set / interface ethernet-1/2 subinterface 0 admin-state enable
        set / interface ethernet-1/2 subinterface 0 ipv4 admin-state enable
        set / interface ethernet-1/2 subinterface 0 ipv4 address 120.0.33.9/31
        set / interface ethernet-1/3 admin-state enable
        set / interface ethernet-1/3 subinterface 0 admin-state enable
        set / interface ethernet-1/3 subinterface 0 ipv4 admin-state enable
        set / interface ethernet-1/3 subinterface 0 ipv4 address 120.0.33.11/31
        set / interface system0 admin-state enable
        set / interface system0 subinterface 0 admin-state enable
        set / interface system0 subinterface 0 ipv4 admin-state enable
        set / interface system0 subinterface 0 ipv4 address 120.0.32.4/32
        set / network-instance default interface ethernet-1/1.0
        set / network-instance default interface ethernet-1/2.0
        set / network-instance default interface ethernet-1/3.0
        set / network-instance default interface system0.0
        set / network-instance default protocols ospf instance main admin-state enable
        set / network-instance default protocols ospf instance main version ospf-v2
        set / network-instance default protocols ospf instance main router-id 120.0.32.4
        set / network-instance default protocols ospf instance main area 0.0.0.0 interface system0.0 passive true
        set / network-instance default protocols ospf instance main area 0.0.0.0 interface ethernet-1/1.0 interface-type point-to-point
        set / network-instance default protocols ospf instance main area 0.0.0.0 interface ethernet-1/2.0 interface-type point-to-point
        set / network-instance default protocols ospf instance main area 0.0.0.0 interface ethernet-1/3.0 interface-type point-to-point
        set / interface ethernet-1/10 admin-state enable
        set / interface ethernet-1/10 subinterface 0 admin-state enable
        set / interface ethernet-1/10 subinterface 0 ipv4 admin-state enable
        set / interface ethernet-1/10 subinterface 0 ipv4 address 120.0.35.0/31
        set / network-instance default interface ethernet-1/10.0
        set / network-instance default protocols ospf instance main area 0.0.0.0 interface ethernet-1/10.0 passive true

    # ------------------------------------------------------------------ PE-isp
    PE-isp:
      kind: nokia_srlinux
      mgmt-ipv4: 172.20.20.21
      group: edge
      startup-config: |
        set / interface ethernet-1/1 admin-state enable
        set / interface ethernet-1/1 subinterface 0 admin-state enable
        set / interface ethernet-1/1 subinterface 0 ipv4 admin-state enable
        set / interface ethernet-1/1 subinterface 0 ipv4 address 120.0.34.1/31
        set / interface system0 admin-state enable
        set / interface system0 subinterface 0 admin-state enable
        set / interface system0 subinterface 0 ipv4 admin-state enable
        set / interface system0 subinterface 0 ipv4 address 120.0.32.21/32
        set / network-instance default interface ethernet-1/1.0
        set / network-instance default interface system0.0
        set / network-instance default protocols ospf instance main admin-state enable
        set / network-instance default protocols ospf instance main version ospf-v2
        set / network-instance default protocols ospf instance main router-id 120.0.32.21
        set / network-instance default protocols ospf instance main area 0.0.0.0 interface system0.0 passive true
        set / network-instance default protocols ospf instance main area 0.0.0.0 interface ethernet-1/1.0 interface-type point-to-point

    PE-nomad:
      kind: nokia_srlinux
      mgmt-ipv4: 172.20.20.22
      group: edge
      startup-config: |
        set / interface ethernet-1/1 admin-state enable
        set / interface ethernet-1/1 subinterface 0 admin-state enable
        set / interface ethernet-1/1 subinterface 0 ipv4 admin-state enable
        set / interface ethernet-1/1 subinterface 0 ipv4 address 120.0.34.3/31
        set / interface ethernet-1/4 admin-state enable
        set / interface ethernet-1/4 subinterface 0 admin-state enable
        set / interface ethernet-1/4 subinterface 0 ipv4 admin-state enable
        set / interface ethernet-1/4 subinterface 0 ipv4 address 120.0.38.1/24
        set / interface ethernet-1/4 subinterface 0 ipv4 dhcp-relay admin-state enable
        set / interface ethernet-1/4 subinterface 0 ipv4 dhcp-relay server [ 120.0.36.10 ]
        set / interface system0 admin-state enable
        set / interface system0 subinterface 0 admin-state enable
        set / interface system0 subinterface 0 ipv4 admin-state enable
        set / interface system0 subinterface 0 ipv4 address 120.0.32.22/32
        set / network-instance default interface ethernet-1/1.0
        set / network-instance default interface ethernet-1/4.0
        set / network-instance default interface system0.0
        set / network-instance default protocols ospf instance main admin-state enable
        set / network-instance default protocols ospf instance main version ospf-v2
        set / network-instance default protocols ospf instance main router-id 120.0.32.22
        set / network-instance default protocols ospf instance main area 0.0.0.0 interface system0.0 passive true
        set / network-instance default protocols ospf instance main area 0.0.0.0 interface ethernet-1/1.0 interface-type point-to-point

    PE-site:
      kind: nokia_srlinux
      mgmt-ipv4: 172.20.20.23
      group: edge
      startup-config: |
        set / interface ethernet-1/1 admin-state enable
        set / interface ethernet-1/1 subinterface 0 admin-state enable
        set / interface ethernet-1/1 subinterface 0 ipv4 admin-state enable
        set / interface ethernet-1/1 subinterface 0 ipv4 address 120.0.34.5/31
        set / interface ethernet-1/4 admin-state enable
        set / interface ethernet-1/4 subinterface 0 admin-state enable
        set / interface ethernet-1/4 subinterface 0 ipv4 admin-state enable
        set / interface ethernet-1/4 subinterface 0 ipv4 address 120.0.37.1/24
        set / interface ethernet-1/4 subinterface 0 ipv4 dhcp-relay admin-state enable
        set / interface ethernet-1/4 subinterface 0 ipv4 dhcp-relay server [ 120.0.36.10 ]
        set / interface system0 admin-state enable
        set / interface system0 subinterface 0 admin-state enable
        set / interface system0 subinterface 0 ipv4 admin-state enable
        set / interface system0 subinterface 0 ipv4 address 120.0.32.23/32
        set / network-instance default interface ethernet-1/1.0
        set / network-instance default interface ethernet-1/4.0
        set / network-instance default interface system0.0
        set / network-instance default protocols ospf instance main admin-state enable
        set / network-instance default protocols ospf instance main version ospf-v2
        set / network-instance default protocols ospf instance main router-id 120.0.32.23
        set / network-instance default protocols ospf instance main area 0.0.0.0 interface system0.0 passive true
        set / network-instance default protocols ospf instance main area 0.0.0.0 interface ethernet-1/1.0 interface-type point-to-point
        set / interface ethernet-1/3 admin-state enable
        set / interface ethernet-1/3 subinterface 0 admin-state enable
        set / interface ethernet-1/3 subinterface 0 ipv4 admin-state enable
        set / interface ethernet-1/3 subinterface 0 ipv4 address 120.0.35.2/31
        set / network-instance default interface ethernet-1/3.0
        set / network-instance default protocols ospf instance main area 0.0.0.0 interface ethernet-1/3.0 passive true
        set / network-instance default protocols ospf instance main area 0.0.0.0 interface ethernet-1/4.0 passive true

    # Host bridges
    net-isp:
      kind: bridge
    net-nomad:
      kind: bridge
    net-site:
      kind: bridge
    svc-net:
      kind: bridge

    dhcp:
      kind: linux
      image: gns3/dhcp:latest
      binds:
        - ./dhcp:/opt/dhcp:ro
      cmd: /bin/sh -lc "sleep 1; for i in {1..30}; do ip link set eth1 up 2>/dev/null && break; sleep 0.5; done; ip addr add 120.0.36.10/24 dev eth1 2>/dev/null || true; ip route add 120.0.32.0/20 via 120.0.36.1 dev eth1 2>/dev/null || true; mkdir -p /etc/dnsmasq.d; cp /opt/dhcp/dnsmasq.conf /etc/dnsmasq.d/enterprise-dhcp.conf; dnsmasq --no-daemon --bind-dynamic --conf-file=/etc/dnsmasq.d/enterprise-dhcp.conf"
    SITE-CLIENT:
      kind: linux
      image: alpine:latest
      cmd: /bin/sh -lc "sleep infinity"
      exec:
        - sh -lc "apk add --no-cache iproute2 && udhcpc -i eth1 -q && ip route del default via 172.20.20.1"
    RESIDENTIAL-BOX:
      kind: linux
      image: alpine:latest
      binds:
        - ./residential/dnsmasq.conf:/etc/dnsmasq.conf
        - ./residential/setup-box.sh:/usr/local/bin/setup-box.sh
      cmd: /bin/sh /usr/local/bin/setup-box.sh
    NOMAD-CLIENT:
      kind: linux
      image: alpine:latest
      cmd: /bin/sh -lc "sleep infinity"
      exec:
        - sh -lc "apk add --no-cache iproute2 && udhcpc -i eth1 -q && ip route del default via 172.20.20.1"

    # ------------------------------------------------------------------ VoIP
    pbx:
      kind: linux
      image: voip-lab/asterisk
      mgmt-ipv4: 172.20.20.31
      binds:
        - voip-lab/asterisk/sip.conf:/etc/asterisk/sip.conf
        - voip-lab/asterisk/extensions.conf:/etc/asterisk/extensions.conf
      exec:
        - ip addr add 120.0.35.1/31 dev eth1
        - ip link set eth1 up
        - ip route add 120.0.35.2/31 via 120.0.35.0
        - ip route add 120.0.35.4/31 via 120.0.35.0

    phone-site:
      kind: linux
      image: voip-lab/client
      mgmt-ipv4: 172.20.20.32
      env:
        SIP_USER: "1001"
        SIP_SERVER: "120.0.35.1"
        SIP_PASS: secret1
      exec:
        - ip addr add 120.0.35.3/31 dev eth1
        - ip link set eth1 up
        - ip route add 120.0.35.0/31 via 120.0.35.2

    phone-nomad:
      kind: linux
      image: voip-lab/client
      mgmt-ipv4: 172.20.20.33
      env:
        SIP_USER: "1002"
        SIP_SERVER: "120.0.35.1"
        SIP_PASS: secret2
      exec:
        - ip addr add 120.0.35.5/31 dev eth1
        - ip link set eth1 up
        - ip route add 120.0.35.0/31 via 120.0.35.4

  links:
    # IGP Full Mesh Core
    - endpoints: ["P1:e1-1", "P2:e1-1"]   # 120.0.33.0/31
    - endpoints: ["P1:e1-2", "P3:e1-1"]   # 120.0.33.2/31
    - endpoints: ["P1:e1-3", "P4:e1-1"]   # 120.0.33.4/31
    - endpoints: ["P2:e1-2", "P3:e1-2"]   # 120.0.33.6/31
    - endpoints: ["P2:e1-3", "P4:e1-2"]   # 120.0.33.8/31
    - endpoints: ["P3:e1-3", "P4:e1-3"]   # 120.0.33.10/31

    # PE uplinks
    - endpoints: ["P1:e1-10", "PE-isp:e1-1"]    # 120.0.34.0/31
    - endpoints: ["P2:e1-10", "PE-nomad:e1-1"]  # 120.0.34.2/31
    - endpoints: ["P3:e1-10", "PE-site:e1-1"]   # 120.0.34.4/31
    - endpoints: ["P2:e1-4", "dns-as12:eth1"]   # 120.0.34.6/31

    # DHCP service segment
    - endpoints: ["P3:e1-11", "svc-net:p3-port"]
    - endpoints: ["dhcp:eth1", "svc-net:dhcp-port"]

    # Relayed DHCP Clients 
    - endpoints: ["SITE-CLIENT:eth1",  "PE-site:e1-4"]
    - endpoints: ["RESIDENTIAL-BOX:eth1", "PE-nomad:e1-4"]
    - endpoints: ["NOMAD-CLIENT:eth1", "RESIDENTIAL-BOX:eth2"]

    # PE southbound to host bridges
    - endpoints: ["PE-isp:e1-2",   "net-isp:pe-isp-port"]
    - endpoints: ["PE-nomad:e1-2", "net-nomad:pe-nomad-port"]
    - endpoints: ["PE-site:e1-2",  "net-site:pe-site-port"]

    # VoIP
    - endpoints: ["P4:e1-10",      "pbx:eth1"]          # 120.0.35.0/31
    - endpoints: ["PE-site:e1-3",  "phone-site:eth1"]   # 120.0.35.2/31  intranet
    - endpoints: ["PE-nomad:e1-3", "phone-nomad:eth1"]  # 120.0.35.4/31  externe