    # ===[SERVICES]==============================================================

    # ---[DNS]-------------------------------------------------------------------
    dns-as12:
      kind: linux
      image: internetsystemsconsortium/bind9:9.21
      mgmt-ipv4: 172.20.20.30
      group: services
      binds:
        - ./dns:/etc/bind
      exec:
        - sh -lc 'if command -v apk >/dev/null 2>&1; then apk add --no-cache tcpdump; else apt-get update && DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends tcpdump && rm -rf /var/lib/apt/lists/*; fi'
        - sh -lc 'printf "nameserver 120.0.36.1\n" > /etc/resolv.conf'
        - ip link set eth1 up
        - ip addr add 120.0.36.1/31 dev eth1
        - ip route replace default via 120.0.36.0

    # ---[DHCP]------------------------------------------------------------------
    dhcp:
      kind: linux
      image: gns3/dhcp:latest
      cap-add:
        - NET_ADMIN
      binds:
        - ./dhcp:/opt/dhcp:ro
      cmd: /bin/sh -lc "sleep 1; for i in {1..30}; do ip link set eth1 up 2>/dev/null && break; sleep 0.5; done; ip addr add 120.0.36.3/31 dev eth1 2>/dev/null || true; ip route add 120.0.32.0/20 via 120.0.36.2 dev eth1 2>/dev/null || true; mkdir -p /etc/dnsmasq.d; cp /opt/dhcp/dnsmasq.conf /etc/dnsmasq.d/enterprise-dhcp.conf; dnsmasq --no-daemon --bind-dynamic --conf-file=/etc/dnsmasq.d/enterprise-dhcp.conf"

    NOMAD-CLIENT:
      kind: linux
      image: alpine:latest
      mgmt-ipv4: 172.20.20.54
      cmd: /bin/sh -lc "sleep infinity"
      exec:
        - sh -lc 'printf "nameserver 120.0.36.1\n" > /etc/resolv.conf'
        - apk add --no-cache iproute2 tcpdump
        - sh -lc 'ip route del default via 172.20.20.1 dev eth0 || true'
        - udhcpc -i eth1 -q

    # ---[RADIUS]----------------------------------------------------------------
    # Minimal FreeRADIUS server hung off P2 (120.0.34.10/31, RADIUS = .11).
    # Two test users (alice/bob) live in ./radius/authorize; NAS clients and the
    # shared secret are in ./radius/clients.conf. Listens on UDP 1812/1813.
    radius:
      kind: linux
      image: freeradius/freeradius-server:latest
      mgmt-ipv4: 172.20.20.36
      group: services
      binds:
        - ./radius/clients.conf:/etc/raddb/clients.conf:ro
        - ./radius/authorize:/etc/raddb/mods-config/files/authorize:ro
      # The base image lacks iproute2 and the mgmt network may not be ready the
      # instant exec fires, so retry the install until `ip` exists, then bring
      # up the data-plane interface and point the default route at P2.
      exec:
        - sh -lc 'for i in $(seq 1 30); do command -v ip >/dev/null 2>&1 && break; apt-get update >/dev/null 2>&1 && DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends iproute2 >/dev/null 2>&1; sleep 2; done; ip link set eth1 up; ip addr add 120.0.34.11/31 dev eth1 2>/dev/null || true; ip route replace default via 120.0.34.10'

    CRISP-CLIENT:
      kind: linux
      image: alpine:latest
      mgmt-ipv4: 172.20.20.56
      cmd: /bin/sh -lc "sleep infinity"
      exec:
        - sh -lc 'printf "nameserver 120.0.36.1\n" > /etc/resolv.conf'
        - apk add --no-cache iproute2 tcpdump
        - sh -lc 'ip route del default via 172.20.20.1 dev eth0 || true'
        - udhcpc -i eth1 -q

    # ---[OpenVPN]---------------------------------------------------------------
    # Pre-configured CPE: shipped to the nomad user, plugged into their home CE.
    # Single uplink (eth1) on net-home; default goes through home-ce, which
    # NATs out toward net-isp. Dials the CRISP public IP (203.0.113.50) over UDP/1194.
    ovpn-nomad:
      kind: linux
      mgmt-ipv4: 172.20.20.41
      group: services
      cap-add:
        - NET_ADMIN
      devices:
        - /dev/net/tun:/dev/net/tun
      binds:
        - vpn/openvpn/static.key:/etc/openvpn/static.key:ro
        - vpn/openvpn/nomad.conf:/etc/openvpn/ovpn.conf:ro
      exec:
        - apk add --no-cache openvpn iproute2
        - ip addr add 192.168.1.10/24 dev eth1
        - sh -lc 'ip route del default via 172.20.20.1 dev eth0 || true'
        - ip route replace default via 192.168.1.1 dev eth1
        - sysctl -w net.ipv4.ip_forward=1
        - openvpn --config /etc/openvpn/ovpn.conf --daemon

    # CRISP OpenVPN concentrator: DMZ service with public and DMZ-facing legs.
    #   eth1 -> net-crisp-dmz (120.0.40.2/24)   DMZ leg
    #   eth2 -> net-isp  (203.0.113.50/24) public leg, listens on UDP/1194
    ovpn-site:
      kind: linux
      mgmt-ipv4: 172.20.20.42
      group: services
      cap-add:
        - NET_ADMIN
      devices:
        - /dev/net/tun:/dev/net/tun
      binds:
        - vpn/openvpn/static.key:/etc/openvpn/static.key:ro
        - vpn/openvpn/site.conf:/etc/openvpn/ovpn.conf:ro
      exec:
        - apk add --no-cache openvpn iproute2
        - ip addr add 120.0.40.2/24 dev eth1
        - ip addr add 203.0.113.50/24 dev eth2
        - ip route replace default via 120.0.40.1 dev eth1
        - sysctl -w net.ipv4.ip_forward=1
        - openvpn --config /etc/openvpn/ovpn.conf --daemon

    dhcp-crisp:
      kind: linux
      image: gns3/dhcp:latest
      cap-add:
        - NET_ADMIN
      binds:
        - ./crisp/dnsmasq.conf:/opt/dhcp/dnsmasq.conf:ro
      cmd: /bin/sh -lc "sleep 1; for i in {1..30}; do ip link set eth1 up 2>/dev/null && break; sleep 0.5; done; ip addr add 120.0.41.10/24 dev eth1 2>/dev/null || true; ip route add 10.12.30.0/24 via 120.0.41.1 dev eth1 2>/dev/null || true; mkdir -p /etc/dnsmasq.d; cp /opt/dhcp/dnsmasq.conf /etc/dnsmasq.d/crisp-dhcp.conf; dnsmasq --no-daemon --bind-dynamic --conf-file=/etc/dnsmasq.d/crisp-dhcp.conf"

    # Home CE router: simulates a consumer Internet box. NATs the home LAN
    # (192.168.1.0/24) out to the "Internet" (net-isp, 203.0.113.0/24).
    home-ce:
      kind: linux
      mgmt-ipv4: 172.20.20.43
      group: services
      cap-add:
        - NET_ADMIN
      exec:
        - apk add --no-cache iproute2 iptables udhcpc
        - sh -lc 'ip link set eth1 up; udhcpc -i eth1 -q || true'
        - ip addr add 192.168.1.1/24  dev eth2     # LAN (net-home)
        - sh -lc 'ip route del default via 172.20.20.1 dev eth0 || true'
        - sysctl -w net.ipv4.ip_forward=1
        - iptables -t nat -A POSTROUTING -o eth1 -j MASQUERADE

    # ===[VoIP]================================================================

    # VoIP
    pbx:
      kind: linux
      image: voip/asterisk
      mgmt-ipv4: 172.20.20.31
      binds:
        - voip/asterisk/sip.conf:/etc/asterisk/sip.conf
        - voip/asterisk/extensions.conf:/etc/asterisk/extensions.conf
      exec:
        - sh -lc 'printf "nameserver 120.0.36.1\n" > /etc/resolv.conf'
        - ip addr add 120.0.41.5/24 dev eth1
        - ip link set eth1 up
        - ip route replace default via 120.0.41.1

    phone-crisp1:
      kind: linux
      image: voip/client
      mgmt-ipv4: 172.20.20.32
      env:
        SIP_USER: "1001"
        SIP_SERVER: "voip.corentinpradier.com"
        SIP_PASS: secret1
      exec:
        - sh -lc 'printf "nameserver 120.0.36.1\n" > /etc/resolv.conf'
        - ip link set eth1 up
        - ip addr add 10.12.30.101/24 dev eth1
        - ip route replace default via 10.12.30.1 dev eth1

    phone-crisp2:
      kind: linux
      image: voip/client
      mgmt-ipv4: 172.20.20.33
      env:
        SIP_USER: "1002"
        SIP_SERVER: "voip.corentinpradier.com"
        SIP_PASS: secret2
      exec:
        - sh -lc 'printf "nameserver 120.0.36.1\n" > /etc/resolv.conf'
        - ip link set eth1 up
        - ip addr add 10.12.30.102/24 dev eth1
        - ip route replace default via 10.12.30.1 dev eth1


    # ===[WEB]================================================================
    # ----------------------------------------------------- Reverse proxy
    reverse-proxy:
      kind: linux
      image: reverse-proxy:latest
      mgmt-ipv4: 172.20.20.34
      env:
        VPN_CLIENT_NETWORK: "192.168.1.10/32"
        CRISP_CLIENT_NETWORK: "10.12.30.0/24"
      exec:
        - sh -lc 'printf "nameserver 120.0.36.1\n" > /etc/resolv.conf'
        - ip addr add 120.0.40.3/24 dev eth1
        - ip link set eth1 up
        - ip route replace default via 120.0.40.1

    # ----------------------------------------------------- Web servers
    web-server:
      kind: linux
      image: web:latest
      mgmt-ipv4: 172.20.20.35
      exec:
        - sh -lc 'printf "nameserver 120.0.36.1\n" > /etc/resolv.conf'
        - ip addr add 120.0.40.4/24 dev eth1
        - ip link set eth1 up
        - ip route replace default via 120.0.40.1


    # ===[HOSTS]==============================================================

    # Host/service bridges
    net-isp:
      kind: bridge      # "public Internet" — 203.0.113.0/24
    dns-net:
      kind: bridge      # DNS link on P1 — 120.0.36.0/31
    dhcp-net:
      kind: bridge      # DHCP link on P1 — 120.0.36.2/31
    net-nomad:
      kind: bridge      # direct PE-nomad client LAN — 120.0.38.0/24
    net-site:
      kind: bridge      # enterprise client LAN behind PE-site — 120.0.37.0/24
    net-crisp-dmz:
      kind: bridge      # CRISP DMZ VLAN — 120.0.40.0/24
    net-crisp-srv:
      kind: bridge      # CRISP private services VLAN — 120.0.41.0/24
    net-crisp-cli:
      kind: bridge      # CRISP private client net — 10.12.30.0/24
    net-home:
      kind: bridge      # nomad's home LAN behind home-ce — 192.168.1.0/24
    breakout-trunk:
      kind: bridge      # raw trunk toward the physical breakout switch
    br-vlan121:
      kind: bridge      # physical breakout VLAN 121 toward PE-isp
    br-vlan122:
      kind: bridge      # physical breakout VLAN 122 toward PE-site



  links:
    # IGP Full Mesh Core
    - endpoints: ["P1:e1-1", "P2:e1-1"]   # 120.0.33.0/31
    - endpoints: ["P1:e1-2", "P3:e1-1"]   # 120.0.33.2/31
    - endpoints: ["P1:e1-3", "P4:eth1"]   # 120.0.33.4/31
    - endpoints: ["P2:e1-2", "P3:e1-2"]   # 120.0.33.6/31
    - endpoints: ["P2:e1-3", "P4:eth2"]   # 120.0.33.8/31
    - endpoints: ["P3:e1-3", "P4:eth3"]   # 120.0.33.10/31

    # PE uplinks
    - endpoints: ["P1:e1-10", "PE-isp:e1-1"]    # 120.0.34.0/31
    - endpoints: ["P2:e1-10", "PE-nomad:e1-1"]  # 120.0.34.2/31
    - endpoints: ["P3:e1-10", "PE-site:e1-1"]   # 120.0.34.4/31
    - endpoints: ["P2:e1-5", "radius:eth1"]     # 120.0.34.10/31

    # P1 service links
    - endpoints: ["P1:e1-9", "dns-net:p1-dns-port"]
    - endpoints: ["dns-as12:eth1", "dns-net:dns-port"]
    - endpoints: ["P1:e1-11", "dhcp-net:p1-dhcp-port"]
    - endpoints: ["dhcp:eth1", "dhcp-net:dhcp-port"]

    # Enterprise client access + CRISP LAN
    # SITE-CLIENT previously modelled here; node removed so no static host endpoint.
    - endpoints: ["ovpn-site:eth1",  "net-crisp-dmz:ovpn-site-port"]
    - endpoints: ["reverse-proxy:eth1", "net-crisp-dmz:reverse-proxy-port"]
    - endpoints: ["web-server:eth1", "net-crisp-dmz:web-server-port"]
    - endpoints: ["pbx:eth1", "net-crisp-srv:pbx-port"]
    - endpoints: ["dhcp-crisp:eth1", "net-crisp-srv:crisp-dhcp-port"]
    - endpoints: ["CRISP:e1-2", "net-crisp-dmz:crisp-dmz-port"]
    - endpoints: ["CRISP:e1-3", "net-crisp-srv:crisp-srv-port"]
    - endpoints: ["CRISP:e1-4", "net-crisp-cli:crisp-client-port"]
    - endpoints: ["CRISP-CLIENT:eth1", "net-crisp-cli:crisp-client-host-port"]
    - endpoints: ["PE-nomad:e1-4", "net-nomad:pe-nomad-port"]
    - endpoints: ["NOMAD-CLIENT:eth1", "net-nomad:nomad-client-port"]

    # PE southbound to host bridges
    - endpoints: ["PE-isp:e1-2",   "net-isp:pe-isp-port"]    # 203.0.113.1/24 (public side)
    - endpoints: ["PE-isp:e1-3",   "br-vlan121:pe-isp-vlan121"]  # VLAN 121, 120.0.39.1/24
    - endpoints: ["PE-site:e1-2",  "net-site:pe-site-port"]  # 120.0.37.1/24 (enterprise client LAN)
    - endpoints: ["PE-site:e1-5",  "br-vlan122:pe-site-vlan122"] # VLAN 122, 120.0.41.1/24
    - endpoints: ["ovpn-site:eth2",  "net-isp:ovpn-site-pub"]     # 203.0.113.50/24
    - endpoints: ["PE-site:e1-4",  "CRISP:e1-1"]  # 120.0.39.0/31 (PE-site <-> CRISP transit)

    # Home CE WAN attached to the residential aggregation (PE-nomad)
    - endpoints: ["home-ce:eth1",    "net-nomad:home-ce-wan"]      # DHCP WAN via PE-nomad (120.0.38.0/24)
    - endpoints: ["home-ce:eth2",    "net-home:home-ce-lan"]      # 192.168.1.1/24

    # Nomad CPE plugs into the home LAN
    - endpoints: ["ovpn-nomad:eth1", "net-home:ovpn-nomad-port"]  # 192.168.1.10/24

    # VoIP
    - endpoints: ["phone-crisp1:eth1",  "net-crisp-cli:phone-crisp1-port"]   # 10.12.30.101/24
    - endpoints: ["phone-crisp2:eth1", "net-crisp-cli:phone-crisp2-port"]   # 10.12.30.102/24

    # Physical breakout trunk for P4 BGP interconnect VLANs 1012/1213
    - endpoints: ["P4:eth4", "breakout-trunk:p4-trunk"]
  # end
