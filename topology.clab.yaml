    # ===[SERVICES]==============================================================

    # ---[DNS]-------------------------------------------------------------------
    dns-as12:
      kind: linux
      image: internetsystemsconsortium/bind9:9.21
      mgmt-ipv4: 172.20.20.30
      group: services
      binds:
        - ./dns:/etc/bind
      exec:
        - sh -lc 'if command -v apk >/dev/null 2>&1; then apk add --no-cache tcpdump; else apt-get update && DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends tcpdump && rm -rf /var/lib/apt/lists/*; fi'
        - sh -lc 'printf "nameserver 172.20.20.30\n" > /etc/resolv.conf'
        - ip link set eth1 up
        - ip addr add 120.0.34.7/31 dev eth1
        - ip route replace default via 120.0.34.6

    # ---[DHCP]------------------------------------------------------------------
    dhcp:
      kind: linux
      image: gns3/dhcp:latest
      cap-add:
        - NET_ADMIN
      binds:
        - ./dhcp:/opt/dhcp:ro
      cmd: /bin/sh -lc "sleep 1; for i in {1..30}; do ip link set eth1 up 2>/dev/null && break; sleep 0.5; done; ip addr add 120.0.36.10/24 dev eth1 2>/dev/null || true; ip route add 120.0.32.0/20 via 120.0.36.1 dev eth1 2>/dev/null || true; mkdir -p /etc/dnsmasq.d; cp /opt/dhcp/dnsmasq.conf /etc/dnsmasq.d/enterprise-dhcp.conf; dnsmasq --no-daemon --bind-dynamic --conf-file=/etc/dnsmasq.d/enterprise-dhcp.conf"

    # ---[RADIUS]----------------------------------------------------------------
    # Minimal FreeRADIUS server hung off P2 (120.0.34.10/31, RADIUS = .11).
    # Two test users (alice/bob) live in ./radius/authorize; NAS clients and the
    # shared secret are in ./radius/clients.conf. Listens on UDP 1812/1813.
    radius:
      kind: linux
      image: freeradius/freeradius-server:latest
      mgmt-ipv4: 172.20.20.36
      group: services
      binds:
        - ./radius/clients.conf:/etc/raddb/clients.conf:ro
        - ./radius/authorize:/etc/raddb/mods-config/files/authorize:ro
      # The base image lacks iproute2 and the mgmt network may not be ready the
      # instant exec fires, so retry the install until `ip` exists, then bring
      # up the data-plane interface and point the default route at P2.
      exec:
        - sh -lc 'for i in $(seq 1 30); do command -v ip >/dev/null 2>&1 && break; apt-get update >/dev/null 2>&1 && DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends iproute2 >/dev/null 2>&1; sleep 2; done; ip link set eth1 up; ip addr add 120.0.34.11/31 dev eth1 2>/dev/null || true; ip route replace default via 120.0.34.10'

    test-site:
      kind: linux
      mgmt-ipv4: 172.20.20.51
      group: hosts
      exec:
        - sh -lc 'if command -v apk >/dev/null 2>&1; then apk add --no-cache tcpdump; else apt-get update && DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends tcpdump && rm -rf /var/lib/apt/lists/*; fi'
        - ip addr add 10.12.20.100/24 dev eth1
        - sh -lc 'ip route del default via 172.20.20.1 dev eth0 || true'
        - ip route replace default via 10.12.20.1 dev eth1

    SITE-CLIENT:
      kind: linux
      image: alpine:latest
      mgmt-ipv4: 172.20.20.52
      cmd: /bin/sh -lc "sleep infinity"
      exec:
        - apk add --no-cache iproute2 tcpdump
        - sh -lc 'ip route del default via 172.20.20.1 dev eth0 || true'
        - udhcpc -i eth1 -q

    RESIDENTIAL-BOX:
      kind: linux
      image: alpine:latest
      mgmt-ipv4: 172.20.20.53
      cap-add:
        - NET_ADMIN
      binds:
        - ./dhcp/residential/dnsmasq.conf:/etc/dnsmasq.conf
        - ./dhcp/residential/setup-box.sh:/usr/local/bin/setup-box.sh
      cmd: /bin/sh /usr/local/bin/setup-box.sh

    NOMAD-CLIENT:
      kind: linux
      image: alpine:latest
      mgmt-ipv4: 172.20.20.54
      cmd: /bin/sh -lc "sleep infinity"
      exec:
        - apk add --no-cache iproute2 tcpdump
        - sh -lc 'ip route del default via 172.20.20.1 dev eth0 || true'
        - udhcpc -i eth1 -q

    # ---[OpenVPN]---------------------------------------------------------------
    # Pre-configured CPE: shipped to the nomad user, plugged into their home CE.
    # Single uplink (eth1) on net-home; default goes through home-ce, which
    # NATs out toward net-isp. Dials the HQ public IP (203.0.113.50) over UDP/1194.
    ovpn-nomad:
      kind: linux
      mgmt-ipv4: 172.20.20.41
      group: services
      cap-add:
        - NET_ADMIN
      devices:
        - /dev/net/tun:/dev/net/tun
      binds:
        - vpn/openvpn/static.key:/etc/openvpn/static.key:ro
        - vpn/openvpn/nomad.conf:/etc/openvpn/ovpn.conf:ro
      exec:
        - apk add --no-cache openvpn iproute2
        - ip addr add 192.168.1.10/24 dev eth1
        - sh -lc 'ip route del default via 172.20.20.1 dev eth0 || true'
        - ip route replace default via 192.168.1.1 dev eth1
        - sysctl -w net.ipv4.ip_forward=1
        - openvpn --config /etc/openvpn/ovpn.conf --daemon

    # HQ OpenVPN concentrator: dual-homed.
    #   eth1 -> net-site (10.12.20.2/24)   inner / enterprise LAN
    #   eth2 -> net-isp  (203.0.113.50/24) DMZ leg, listens on UDP/1194
    ovpn-site:
      kind: linux
      mgmt-ipv4: 172.20.20.42
      group: services
      cap-add:
        - NET_ADMIN
      devices:
        - /dev/net/tun:/dev/net/tun
      binds:
        - vpn/openvpn/static.key:/etc/openvpn/static.key:ro
        - vpn/openvpn/site.conf:/etc/openvpn/ovpn.conf:ro
      exec:
        - apk add --no-cache openvpn iproute2
        - ip addr add 10.12.20.2/24 dev eth1
        - ip addr add 203.0.113.50/24 dev eth2
        - ip route replace default via 10.12.20.1 dev eth1
        - sysctl -w net.ipv4.ip_forward=1
        - openvpn --config /etc/openvpn/ovpn.conf --daemon

    # Home CE router: simulates a consumer Internet box. NATs the home LAN
    # (192.168.1.0/24) out to the "Internet" (net-isp, 203.0.113.0/24).
    home-ce:
      kind: linux
      mgmt-ipv4: 172.20.20.43
      group: services
      cap-add:
        - NET_ADMIN
      exec:
        - apk add --no-cache iproute2 iptables
        - ip addr add 203.0.113.20/24 dev eth1     # WAN (net-isp)
        - ip addr add 192.168.1.1/24  dev eth2     # LAN (net-home)
        - sh -lc 'ip route del default via 172.20.20.1 dev eth0 || true'
        - ip route replace default via 203.0.113.1 dev eth1
        - sysctl -w net.ipv4.ip_forward=1
        - iptables -t nat -A POSTROUTING -o eth1 -j MASQUERADE

    # ===[VoIP]================================================================

    # VoIP
    pbx:
      kind: linux
      image: voip/asterisk
      mgmt-ipv4: 172.20.20.31
      binds:
        - voip/asterisk/sip.conf:/etc/asterisk/sip.conf
        - voip/asterisk/extensions.conf:/etc/asterisk/extensions.conf
      exec:
        - sh -lc 'printf "nameserver 172.20.20.30\n" > /etc/resolv.conf'
        - ip addr add 120.0.35.1/31 dev eth1
        - ip link set eth1 up
        - ip route add 120.0.35.2/31 via 120.0.35.0
        - ip route add 120.0.35.4/31 via 120.0.35.0

    phone-site:
      kind: linux
      image: voip/client
      mgmt-ipv4: 172.20.20.32
      env:
        SIP_USER: "1001"
        SIP_SERVER: "voip.corentinpradier.com"
        SIP_PASS: secret1
      exec:
        - sh -lc 'printf "nameserver 172.20.20.30\n" > /etc/resolv.conf'
        - ip link set eth1 up
        - ip addr add 120.0.35.3/31 dev eth1
        - ip route replace default via 120.0.35.2 dev eth1

    phone-nomad:
      kind: linux
      image: voip/client
      mgmt-ipv4: 172.20.20.33
      env:
        SIP_USER: "1002"
        SIP_SERVER: "voip.corentinpradier.com"
        SIP_PASS: secret2
      exec:
        - sh -lc 'printf "nameserver 172.20.20.30\n" > /etc/resolv.conf'
        - ip link set eth1 up
        - ip addr add 120.0.35.5/31 dev eth1
        - ip route replace default via 120.0.35.4 dev eth1


    # ===[WEB]================================================================
    # ----------------------------------------------------- Reverse proxy
    reverse-proxy:
      kind: linux
      image: reverse-proxy:latest
      mgmt-ipv4: 172.20.20.34
      env:
        NOMAD_NETWORK: "120.0.37.0/24"
        SITE_NETWORK: "120.0.38.0/24"
      exec:
        - sh -lc 'printf "nameserver 172.20.20.30\n" > /etc/resolv.conf'
        - ip addr add 120.0.34.9/31 dev eth1
        - ip link set eth1 up
        - ip route add default via 120.0.34.8
        - ip addr add 192.168.1.1/24 dev eth2
        - ip link set eth2 up

    # ----------------------------------------------------- Web servers
    web-server:
      kind: linux
      image: web:latest
      mgmt-ipv4: 172.20.20.35
      exec:
        - sh -lc 'printf "nameserver 172.20.20.30\n" > /etc/resolv.conf'
        - ip addr add 192.168.1.2/24 dev eth1
        - ip link set eth1 up
        - ip route add default via 192.168.1.1


    # ===[HOSTS]==============================================================

    # Host/service bridges
    net-isp:
      kind: bridge      # "public Internet" — 203.0.113.0/24
    net-nomad:
      kind: bridge
    net-site:
      kind: bridge      # HQ LAN behind PE-site — 10.12.20.0/24
    net-home:
      kind: bridge      # nomad's home LAN behind home-ce — 192.168.1.0/24
    br-vlan104:
      kind: bridge
    br-vlan121:
      kind: bridge
    br-vlan122:
      kind: bridge



  links:
    # IGP Full Mesh Core
    - endpoints: ["P1:e1-1", "P2:e1-1"]   # 120.0.33.0/31
    - endpoints: ["P1:e1-2", "P3:e1-1"]   # 120.0.33.2/31
    - endpoints: ["P1:e1-3", "P4:eth1"]   # 120.0.33.4/31
    - endpoints: ["P2:e1-2", "P3:e1-2"]   # 120.0.33.6/31
    - endpoints: ["P2:e1-3", "P4:eth2"]   # 120.0.33.8/31
    - endpoints: ["P3:e1-3", "P4:eth3"]   # 120.0.33.10/31

    # PE uplinks
    - endpoints: ["P1:e1-10", "PE-isp:e1-1"]    # 120.0.34.0/31
    - endpoints: ["P2:e1-10", "PE-nomad:e1-1"]  # 120.0.34.2/31
    - endpoints: ["P3:e1-10", "PE-site:e1-1"]   # 120.0.34.4/31
    - endpoints: ["P2:e1-4", "dns-as12:eth1"]   # 120.0.34.6/31
    - endpoints: ["P2:e1-5", "radius:eth1"]     # 120.0.34.10/31

    # DHCP service segment
    - endpoints: ["P3:e1-11", "dhcp:eth1"]

    # Relayed DHCP Clients 
    - endpoints: ["SITE-CLIENT:eth1",  "PE-site:e1-4"]
    - endpoints: ["RESIDENTIAL-BOX:eth1", "PE-nomad:e1-4"]
    - endpoints: ["NOMAD-CLIENT:eth1", "RESIDENTIAL-BOX:eth2"]

    # PE southbound to host bridges
    - endpoints: ["PE-isp:e1-2",   "net-isp:pe-isp-port"]    # 203.0.113.1/24 (public side)
    - endpoints: ["PE-site:e1-2",  "net-site:pe-site-port"]  # 10.12.20.1/24  (HQ LAN)

    # HQ DMZ + LAN (ovpn-site is dual-homed)
    - endpoints: ["ovpn-site:eth1",  "net-site:ovpn-site-port"]   # 10.12.20.2/24
    - endpoints: ["ovpn-site:eth2",  "net-isp:ovpn-site-pub"]     # 203.0.113.50/24
    - endpoints: ["test-site:eth1",  "net-site:test-site-port"]

    # Public Internet ↔ home network (via the CE)
    - endpoints: ["home-ce:eth1",    "net-isp:home-ce-wan"]       # 203.0.113.20/24
    - endpoints: ["home-ce:eth2",    "net-home:home-ce-lan"]      # 192.168.1.1/24

    # Nomad CPE plugs into the home LAN
    - endpoints: ["ovpn-nomad:eth1", "net-home:ovpn-nomad-port"]  # 192.168.1.10/24

    # VoIP
    - endpoints: ["P4:eth10",      "pbx:eth1"]          # 120.0.35.0/31
    - endpoints: ["PE-site:e1-3",  "phone-site:eth1"]   # 120.0.35.2/31  intranet
    - endpoints: ["PE-nomad:e1-3", "phone-nomad:eth1"]  # 120.0.35.4/31  externe

    # External breakout VLAN bridges. The host creates VLAN subinterfaces
    # on one physical trunk NIC and enslaves them to these bridges.
    - endpoints: ["P4:eth4",     "br-vlan104:p4-port"]      # VLAN 104
    - endpoints: ["PE-isp:e1-3", "br-vlan121:pe-isp-a"]     # VLAN 121
    - endpoints: ["PE-isp:e1-4", "br-vlan122:pe-isp-b"]     # VLAN 122

    # Reverse proxy
    - endpoints: ["P1:e1-9", "reverse-proxy:eth1"]

    # Web servers
    - endpoints: ["reverse-proxy:eth2", "web-server:eth1"]
