# Public
server {
    listen 80;
    server_name corentinpradier.com;

    location / {
        root /usr/share/nginx/html/public;
        index index.html;
    }
}

# Intranet
server {
    listen 6767;
    server_name intranet.corentinpradier.com;

    location / {
        root /usr/share/nginx/html/intranet;
        index index.html;
    }
}