# CRISP <-> remote branch office: second static-key listener on ovpn-site,
# coexisting with the nomad tunnel on :1194. Single static-key peer = the
# physical Linux router at the remote AS edge. `float` absorbs the peer's
# source IP (we never pin it; it arrives via the eBGP interconnect).
dev tun1
proto udp
local 120.0.40.2
port 1195
float

ifconfig 10.255.255.6 10.255.255.5
secret /etc/openvpn/static-branch.key

# Push the remote-site LAN into this tunnel so ovpn-site forwards it to tun1.
# Static-key mode can't push routes, so each side installs its own.
route 192.168.50.0 255.255.255.0

cipher none
auth none

keepalive 10 60
persist-key
persist-tun
verb 4
