# Nomad CPE: pre-configured box plugged behind a home CE router.
# Acts as the OpenVPN client/initiator (any source IP, behind NAT).
dev tun
proto udp
nobind

remote 203.0.113.50 1194

ifconfig 10.255.255.1 10.255.255.2
secret /etc/openvpn/static.key

# Pull the CRISP HQ networks over the tunnel (static-key mode doesn't push
# routes, so each side installs its own).
#   120.0.40.0/24  CRISP DMZ (reverse-proxy / web / PBX)
#   10.12.30.0/24  CRISP private client net
# Only these company prefixes are tunneled; the default route stays via the
# home CE, so general Internet / non-company traffic is NOT tunneled
# (split tunnel) and the public website stays reachable without the VPN.
route 120.0.40.0 255.255.255.0
route 10.12.30.0 255.255.255.0

cipher none
auth none

keepalive 10 60
persist-key
persist-tun
verb 4
