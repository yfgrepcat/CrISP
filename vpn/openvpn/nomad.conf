# Nomad CPE: pre-configured box plugged behind a home CE router.
# Acts as the OpenVPN client/initiator (any source IP, behind NAT).
dev tun
proto udp
nobind

remote 203.0.113.50 1194

ifconfig 10.255.255.1 10.255.255.2
secret /etc/openvpn/static.key

# Pull the CRISP LAN over the tunnel (static-key mode doesn't push routes,
# so each side installs its own).
route 120.0.39.0 255.255.255.0

cipher none
auth none

keepalive 10 60
persist-key
persist-tun
verb 4
