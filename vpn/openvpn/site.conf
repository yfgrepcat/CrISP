# CRISP OpenVPN concentrator: single-homed in the DMZ, listens on the DMZ IP.
# Accepts the nomad CPE (single static-key peer) and `float`s with its
# changing source IP/port as the CE behind it NATs.
dev tun
proto udp
local 120.0.40.2
port 1194
float

ifconfig 10.255.255.2 10.255.255.1
secret /etc/openvpn/static.key

# Return path for the nomad CPE's inner address: CRISP services and the DMZ
# reply to 192.168.1.10 through the tunnel endpoint.
route 192.168.1.10 255.255.255.255

cipher none
auth none

keepalive 10 60
persist-key
persist-tun
verb 4
