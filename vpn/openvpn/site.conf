# HQ OpenVPN concentrator: sits in a DMZ, listens on its public IP.
# Accepts the nomad CPE (single static-key peer) and `float`s with its
# changing source IP/port as the CE behind it NATs.
dev tun
proto udp
local 203.0.113.50
port 1194
float

ifconfig 10.255.255.2 10.255.255.1
secret /etc/openvpn/static.key

cipher none
auth none

keepalive 10 60
persist-key
persist-tun
verb 4
