# Remote branch-office gateway -> CRISP site-to-site (static key, point-to-point).
# Runs on the physical Ubuntu router at the remote AS edge, NOT a clab node.
#
# The router reaches the CRISP DMZ listener (120.0.40.2:1195) natively over the
# eBGP interconnect (P4 advertises 120.0.32.0/20), so the VPN endpoint stays on
# the underlay. We therefore do NOT tunnel any 120.0.x prefix -> no recursive
# route through tun0, and no `net_gateway` host-route hack is needed.
dev tun
proto udp
nobind

remote 120.0.48.6 1195

ifconfig 10.255.255.5 10.255.255.6
secret /etc/openvpn/static-branch.key

# Only prefixes that are NOT reachable over public BGP ride the tunnel.
# 10.12.30.0/24 = CRISP private client net (RFC1918, not in 120.0.32.0/20).
# Everything in 120.0.32.0/20 (DMZ / web / DNS / services) stays on eBGP.
route 10.12.30.0 255.255.255.0

cipher none
auth none

keepalive 10 60
persist-key
persist-tun
verb 4
