x-phone: &phone
  build: ./client
  networks:
    - voip

services:
  pbx:
    build: ./asterisk
    container_name: voip-pbx
    volumes:
      - ./asterisk/sip.conf:/etc/asterisk/sip.conf
      - ./asterisk/extensions.conf:/etc/asterisk/extensions.conf
    networks:
      - voip

  phone1:
    <<: *phone
    container_name: voip-phone1
    stdin_open: true
    tty: true
    environment:
      SIP_USER: "1001"
      SIP_SERVER: pbx
      SIP_PASS: secret1

  phone2:
    <<: *phone
    container_name: voip-phone2
    stdin_open: true
    tty: true
    environment:
      SIP_USER: "1002"
      SIP_SERVER: pbx
      SIP_PASS: secret2

networks:
  voip:
    driver: bridge
