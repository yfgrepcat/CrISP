name: voip

topology:
  nodes:
    pbx:
      kind: linux
      image: voip-lab/asterisk
      binds:
        - asterisk/sip.conf:/etc/asterisk/sip.conf
        - asterisk/extensions.conf:/etc/asterisk/extensions.conf

    phone1:
      kind: linux
      image: voip-lab/client
      env:
        SIP_USER: "1001"
        SIP_SERVER: clab-voip-pbx
        SIP_PASS: secret1

    phone2:
      kind: linux
      image: voip-lab/client
      env:
        SIP_USER: "1002"
        SIP_SERVER: clab-voip-pbx
        SIP_PASS: secret2
