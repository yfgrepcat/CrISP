# CRISP client DHCP service
# Runs in the CRISP DMZ and hands out leases for the private client net.

interface=eth1
bind-dynamic
except-interface=lo
listen-address=120.0.40.10

dhcp-authoritative

dhcp-range=10.12.30.100,10.12.30.200,255.255.255.0,12h
dhcp-option=option:router,10.12.30.1
dhcp-option=option:dns-server,120.0.36.1

server=120.0.36.1

dhcp-leasefile=/var/lib/misc/dnsmasq.leases
log-dhcp
log-facility=/var/log/dnsmasq.log
