# Residential Box DHCP Configuration
interface=eth2
bind-dynamic
domain=residential.internal
dhcp-range=192.168.1.100,192.168.1.200,255.255.255.0,12h
dhcp-option=option:router,192.168.1.1
dhcp-option=option:dns-server,192.168.1.1

# Upstream DNS: Point to the AS12 DNS for internal lookups
server=120.0.36.1
server=8.8.8.8
log-dhcp
