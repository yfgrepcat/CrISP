# Minimal DHCP + DNS-forwarder for the lab
# Runs on the DHCP node attached to router P3 (120.0.36.10)

interface=eth1
bind-dynamic
except-interface=lo
listen-address=120.0.36.10

dhcp-authoritative

# Local client pool for the service segment on P3
dhcp-range=120.0.36.100,120.0.36.200,255.255.255.0,12h
dhcp-option=option:router,120.0.36.1
dhcp-option=option:dns-server,120.0.36.10

# Relayed subnets (DHCP requests will arrive via DHCP relay/ip-helper)
# The relay sets `giaddr` so dnsmasq can select the matching range.
# Enterprise
dhcp-range=set:enterprise,120.0.37.100,120.0.37.200,255.255.255.0,12h
dhcp-option=tag:enterprise,option:router,120.0.37.1
dhcp-option=tag:enterprise,option:dns-server,120.0.36.10

# Private/residential 
dhcp-range=set:private,120.0.38.100,120.0.38.200,255.255.255.0,12h
dhcp-option=tag:private,option:router,120.0.38.1
dhcp-option=tag:private,option:dns-server,120.0.36.10

# DNS forwarding: use lab BIND for enterprise zone and as upstream
server=/enterprise.local/120.0.34.7
server=120.0.34.7
server=1.1.1.1
server=8.8.8.8

# Lease file and logging
dhcp-leasefile=/var/lib/misc/dnsmasq.leases
log-dhcp
log-facility=/var/log/dnsmasq.log
