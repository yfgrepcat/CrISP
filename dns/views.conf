view "enterprise" {
  match-clients { enterprise-nets; };
  recursion yes;

  zone "." IN {
    type hint;
    file "/etc/bind/root.hints";
  };

  zone "corentinpradier.com" IN {
    type master;
    file "/etc/bind/zones/db.corentinpradier.com";
  };
};

view "residential" {
  match-clients { residential-nets; };
  recursion yes;

  zone "." IN {
    type hint;
    file "/etc/bind/root.hints";
  };

  zone "corentinpradier.com" IN {
    type master;
    file "/etc/bind/zones/db.corentinpradier.com.public";
  };
};

view "default" {
  match-clients { any; };
  recursion no;
  allow-recursion { none; };

  zone "corentinpradier.com" IN {
    type master;
    file "/etc/bind/zones/db.corentinpradier.com.public";
  };
};
