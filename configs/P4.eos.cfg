hostname P4
!
ip routing
!
! AAA / RADIUS — authenticate logins against the AS12 FreeRADIUS server (120.0.34.11)
radius-server host 120.0.34.11 key testing123
ip radius source-interface Loopback0
aaa authentication login default group radius local
aaa authorization exec default group radius local
! EOS skips AAA authorization on the serial console by default; enable it so the
! RADIUS-returned privilege level (Arista-AVPair shell:priv-lvl) is applied there.
aaa authorization serial-console
!
interface Management1
   no ip address
!
interface Ethernet1
   description P1 core link
   no switchport
   ip address 120.0.33.5/31
   ip ospf area 0.0.0.0
   ip ospf network point-to-point
   no shutdown
!
interface Ethernet2
   description P2 core link
   no switchport
   ip address 120.0.33.9/31
   ip ospf area 0.0.0.0
   ip ospf network point-to-point
   no shutdown
!
interface Ethernet3
   description P3 core link
   no switchport
   ip address 120.0.33.11/31
   ip ospf area 0.0.0.0
   ip ospf network point-to-point
   no shutdown
!
interface Ethernet4
   description Interco BGP vers switch externe
   no switchport
   no ip address
   no shutdown
!
interface Ethernet4.1012
   description Interco BGP VLAN 1012
   encapsulation dot1q vlan 1012
   ip address 10.0.2.12/24
   no shutdown
!
interface Ethernet4.1213
   description Interco BGP VLAN 1213
   encapsulation dot1q vlan 1213
   ip address 10.0.4.12/24
   no shutdown
!
interface Ethernet10
   description PBX VoIP link
   no switchport
   ip address 120.0.35.0/31
   ip ospf area 0.0.0.0
   no shutdown
!
interface Loopback0
   description OSPF router ID
   ip address 120.0.32.4/32
   ip ospf area 0.0.0.0
!
interface Loopback1
   description Loopback BGP
   ip address 10.0.0.12/32
!
! MAXI ROUTE ET ROUTES STATIQUES BGP
ip route 120.0.32.0/20 Null0
ip route 10.0.0.10/32 10.0.2.10
ip route 10.0.0.13/32 10.0.4.13
!
router bgp 12
   network 120.0.32.0/20
   neighbor 10.0.0.10 remote-as 10
   neighbor 10.0.0.10 ebgp-multihop 2
   neighbor 10.0.0.10 update-source Loopback1
   !
   neighbor 10.0.0.11 remote-as 11
   neighbor 10.0.0.11 update-source Loopback1
   !
   neighbor 10.0.0.13 remote-as 13
   neighbor 10.0.0.13 ebgp-multihop 2
   neighbor 10.0.0.13 update-source Loopback1
!
router ospf 1
   router-id 120.0.32.4
   passive-interface Loopback0
   ! injection bgp dans ospf
   redistribute bgp
!
